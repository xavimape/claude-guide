<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Página no encontrada · Claude AI Guide</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #08090D; color: #EAEBF4;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
  }
  .container { max-width: 480px; }
  .code {
    font-size: 96px; font-weight: 700; line-height: 1;
    background: linear-gradient(135deg, #7C5CFC, #00D4FF);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 16px;
  }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
  p  { color: #9EA3C0; margin-bottom: 32px; line-height: 1.6; }
  .btn {
    display: inline-block; padding: 12px 28px;
    background: #7C5CFC; color: #fff; text-decoration: none;
    border-radius: 8px; font-weight: 600; font-size: 15px;
    transition: background 0.2s;
  }
  .btn:hover { background: #5A3FD6; }
</style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Página no encontrada</h1>
    <p>La sección que buscás no existe o fue movida.<br>Volvé al inicio para navegar la guía completa.</p>
    <a href="/" class="btn">← Volver al inicio</a>
  </div>
</body>
</html>
